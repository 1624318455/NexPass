<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexPass</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf5ff;
      color: #1e1b4b;
    }

    .header {
      background: #5B21B6;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .shield {
      font-size: 24px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header .subtitle {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      font-size: 12px;
      border-bottom: 1px solid #e9d5ff;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #dc2626;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #16a34a;
    }

    .section {
      padding: 12px 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #7c3aed;
      margin-bottom: 8px;
    }

    .fill-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .fill-form input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d4bffc;
      border-radius: 6px;
      font-size: 13px;
      background: white;
      color: #1e1b4b;
      outline: none;
    }

    .fill-form input:focus {
      border-color: #5B21B6;
      box-shadow: 0 0 0 2px rgba(91, 33, 182, 0.15);
    }

    .fill-form input::placeholder {
      color: #a78bfa;
    }

    .btn {
      width: 100%;
      padding: 9px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary {
      background: #5B21B6;
      color: white;
    }

    .btn-primary:hover {
      background: #4c1d95;
    }

    .btn-primary:disabled {
      background: #a78bfa;
      cursor: not-allowed;
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 11px;
      color: #7c3aed;
      border-top: 1px solid #e9d5ff;
    }

    .footer a {
      color: #5B21B6;
      text-decoration: none;
    }

    .hidden { display: none; }

    .msg {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      margin-top: 6px;
    }

    .msg-success {
      background: #dcfce7;
      color: #166534;
    }

    .msg-error {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="shield">🛡️</span>
    <div>
      <h1>NexPass</h1>
      <div class="subtitle">Zero-Knowledge Password Manager</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking connection…</span>
  </div>

  <div class="section">
    <div class="section-title">Quick Fill</div>
    <div class="fill-form">
      <input type="text" id="username" placeholder="Username / Email" autocomplete="off" />
      <input type="password" id="password" placeholder="Password" autocomplete="off" />
      <button class="btn btn-primary" id="fillBtn" disabled>Fill Current Page</button>
      <div id="fillMsg" class="hidden"></div>
    </div>
  </div>

  <div class="footer">
    NexPass v1.0.0 · <a href="https://github.com/1624318455/NexPass" target="_blank">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
